<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버스 시간표</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://font.noonnu.cc/css/gryun');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'gryun', sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 2px solid #4C4C4C;
            border-radius: 20px;
            background-color: white;
        }
        
        h1 {
            color: #4C4C4C;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #4C4C4C;
            border-radius: 8px;
            background-color: transparent;
            color: #4C4C4C;
            font-family: 'gryun', sans-serif;
        }
        
        input::placeholder {
            color: #999;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: 2px solid #4C4C4C;
            border-radius: 8px;
            background-color: transparent;
            color: #4C4C4C;
            cursor: pointer;
            font-weight: bold;
            font-family: 'gryun', sans-serif;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background-color: #4C4C4C;
            color: white;
        }
        
        .results {
            margin-top: 30px;
        }
        
        .bus-item {
            border: 2px solid #4C4C4C;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .bus-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4C4C4C;
        }
        
        .bus-route {
            font-size: 18px;
            color: #4C4C4C;
        }
        
        .bus-time {
            font-size: 20px;
            color: #2563eb;
            font-weight: bold;
        }
        
        .bus-info {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            color: #4C4C4C;
            font-size: 18px;
            margin: 20px 0;
        }
        
        .error {
            color: #dc2626;
            text-align: center;
            padding: 15px;
            border: 2px solid #dc2626;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .no-results {
            color: #999;
            text-align: center;
            padding: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>버스 시간표</h1>
        
        <div class="search-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="departure" 
                    placeholder="출발지 (예: 서울)" 
                >
                <input 
                    type="text" 
                    id="arrival" 
                    placeholder="도착지 (예: 부산)" 
                >
            </div>
            <button onclick="searchBuses()">검색</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        const API_KEY = 'dc148c3c07a3236f9b83c0f5a34e8e5dd24ceaa55e1d21f547f0ae6443c08f1a';
        const API_URL = 'https://apis.data.go.kr/1613000/ExpBusInfo/searchExpBusInfo';

        async function searchBuses() {
            const departure = document.getElementById('departure').value.trim();
            const arrival = document.getElementById('arrival').value.trim();
            const resultsDiv = document.getElementById('results');

            if (!departure || !arrival) {
                resultsDiv.innerHTML = '<div class="error">출발지와 도착지를 입력해주세요.</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">검색 중...</div>';

            try {
                // Vercel API를 통해 요청 (CORS 문제 해결)
                const response = await fetch('/api/buses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        departure: departure,
                        arrival: arrival,
                        apiKey: API_KEY
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                if (!data.buses || data.buses.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
                    return;
                }

                let html = '';
                data.buses.forEach(bus => {
                    html += `
                        <div class="bus-item">
                            <div class="bus-header">
                                <span class="bus-route">${bus.routeName || '노선 정보'}</span>
                                <span class="bus-time">${bus.departureTime || '-'}</span>
                            </div>
                            <div class="bus-info">
                                <div>터미널: ${bus.departureTerminal || '-'}</div>
                                <div>요금: ${bus.fare || '-'}원</div>
                                <div>소요시간: ${bus.travelTime || '-'}</div>
                            </div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">오류 발생: ${error.message}</div>`;
            }
        }

        // 엔터 키로도 검색 가능
        document.getElementById('arrival').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchBuses();
        });
    </script>
</body>
</html>
